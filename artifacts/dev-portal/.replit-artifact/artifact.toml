kind = "web"
previewPath = "/dev-portal/"
title = "Developer Portal"
version = "1.0.0"
id = "artifacts/dev-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23288
name = "web"
paths = ["/dev-portal/"]

[services.development]
run = "pnpm --filter @workspace/dev-portal run dev"

[services.env]
PORT = "23288"
BASE_PATH = "/dev-portal/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dev-portal", "run", "build"]
publicDir = "artifacts/dev-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
