kind = "web"
previewPath = "/smart-city-portal/"
title = "Smart City Portal"
version = "1.0.0"
id = "artifacts/smart-city-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21840
name = "web"
paths = ["/smart-city-portal/"]

[services.development]
run = "pnpm --filter @workspace/smart-city-portal run dev"

[services.env]
PORT = "21840"
BASE_PATH = "/smart-city-portal/"

[services.production]
build = ["pnpm", "--filter", "@workspace/smart-city-portal", "run", "build"]
publicDir = "artifacts/smart-city-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
